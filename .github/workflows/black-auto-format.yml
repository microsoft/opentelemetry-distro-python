name: Black Auto-Format

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to run black formatting on
        required: true
        type: string

jobs:
  fix-format:
    runs-on: ubuntu-latest
    # One run per PR at a time; queued runs wait rather than being cancelled.
    concurrency:
      group: black-auto-format-${{ github.event.inputs.pr_number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: read
      issues: write
    steps:
      - name: Fetch and validate PR
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumberStr = context.payload.inputs?.pr_number;
            if (!prNumberStr) {
              core.warning('No pr_number input provided');
              core.setOutput('has-pr', 'false');
              core.setOutput('is-fork', 'false');
              return;
            }
            const prNumber = Number.parseInt(prNumberStr, 10);
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.warning(`Invalid pr_number input: ${prNumberStr}`);
              core.setOutput('has-pr', 'false');
              core.setOutput('is-fork', 'false');
              return;
            }
            core.info(`Got PR #${prNumber} from workflow_dispatch input`);
            const { data: pr } = await github.rest.pulls.get({
              ...context.repo,
              pull_number: prNumber,
            });
            if (pr.state !== 'open') {
              core.info(`PR #${prNumber} is not open — skipping`);
              core.setOutput('has-pr', 'false');
              core.setOutput('is-fork', 'false');
              return;
            }
            // Security: only auto-fix branches in the base repository.
            // Checking out a fork and running tooling with a write token would
            // allow an attacker to execute arbitrary code.
            const baseRepo = `${context.repo.owner}/${context.repo.repo}`;
            if (pr.head.repo.full_name !== baseRepo) {
              core.warning(`PR #${prNumber} is from fork ${pr.head.repo.full_name} — skipping auto-fix`);
              core.setOutput('has-pr', 'false');
              core.setOutput('is-fork', 'true');
              return;
            }
            core.info(`Processing PR #${pr.number} on branch ${pr.head.ref}`);
            core.setOutput('has-pr', 'true');
            core.setOutput('is-fork', 'false');
            core.setOutput('pr-branch', pr.head.ref);
            core.setOutput('pr-repo', pr.head.repo.full_name);

      - name: Notify fork PR author
        if: steps.find-pr.outputs.is-fork == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: Number.parseInt(context.payload.inputs.pr_number, 10),
              body: [
                '⚠️ **Black auto-format skipped for fork PR.**',
                '',
                'The auto-format workflow does not run on pull requests from forks to avoid',
                'executing untrusted code with repository write access.',
                '',
                'Please run `tox -e black` locally and push the formatting fixes to your branch.',
              ].join('\n'),
            });

      - name: Checkout PR branch
        if: steps.find-pr.outputs.has-pr == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.find-pr.outputs.pr-branch }}
          repository: ${{ steps.find-pr.outputs.pr-repo }}
          fetch-depth: 0

      - name: Set up Python
        if: steps.find-pr.outputs.has-pr == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install tox
        if: steps.find-pr.outputs.has-pr == 'true'
        run: python -m pip install --upgrade pip tox

      - name: Format with Black
        if: steps.find-pr.outputs.has-pr == 'true'
        run: tox -e black

      - name: Commit and push formatting fixes
        if: steps.find-pr.outputs.has-pr == 'true'
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No formatting fixes needed"
            echo "CHANGES=false" >> $GITHUB_OUTPUT
          else
            # Only commit Python source changes produced by black.
            git add -u -- '*.py' '*.pyi'

            if git diff --cached --quiet; then
              echo "Formatting changes were detected, but none matched the commit allow-list"
              echo "CHANGES=false" >> $GITHUB_OUTPUT
            else
              git commit -m "chore: apply black formatting fixes"
              git push origin HEAD:"${{ steps.find-pr.outputs.pr-branch }}"
              echo "CHANGES=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Post result comment
        if: steps.find-pr.outputs.has-pr == 'true'
        uses: actions/github-script@v7
        env:
          CHANGES: ${{ steps.commit.outputs.CHANGES }}
        with:
          script: |
            const prNumber = Number.parseInt(context.payload.inputs.pr_number, 10);

            if (process.env.CHANGES === 'true') {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: prNumber,
                body: '✅ Automatically ran `black` and pushed the formatting fixes. The Black check should now pass.'
              });
              core.info(`Posted success comment on PR #${prNumber}`);
            } else {
              core.info(`No formatting fixes were needed for PR #${prNumber}`);
            }
