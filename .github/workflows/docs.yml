name: Deploy Docs

on:
  # Rebuild docs only when the package version changes on main, so the
  # published docs always match the latest released package version
  push:
    branches: [main]
    paths:
      - "src/microsoft/opentelemetry/_version.py"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install sphinx sphinx-rtd-theme sphinx-autodoc-typehints

      - name: Build Sphinx docs
        run: |
          cd docs
          make html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
