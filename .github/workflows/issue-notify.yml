name: Notify code owners on new issues

on:
  issues:
    types: [opened, labeled]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const defaultOwners = [
              'hectorhdzg',
              'JacksonWeber',
              'lzchen',
              'rads-1996',
              'jeremydvoss',
              'MSNev',
            ];

            const labelCoOwners = {
              'a365': ['nikhilNava', 'juliomenendez'],
              'langchain': ['nagkumar91'],
            };

            const labels = context.payload.issue.labels.map(l => l.name.toLowerCase());
            const mentions = new Set(defaultOwners);

            for (const [label, owners] of Object.entries(labelCoOwners)) {
              if (labels.includes(label)) {
                owners.forEach(o => mentions.add(o));
              }
            }

            // Ping owners via a comment so they get a GitHub notification email
            const mentionList = [...mentions].map(u => `@${u}`).join(' ');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `cc ${mentionList}`,
            });
