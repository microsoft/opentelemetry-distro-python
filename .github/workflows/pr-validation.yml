name: PR validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Pylint and Mypy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      # Black formatting is applied automatically by `pr-autoformat.yml`
      # (pull_request_target) when GitHub allows the base repo to push to
      # the PR branch. For fork PRs where the contributor unchecked
      # "Allow edits by maintainers", auto-push can't run, so we keep a
      # read-only Black check here as a safety net.
      - name: Check formatting with Black (fork PRs without maintainer edits)
        if: >-
          github.event_name == 'pull_request'
          && github.event.pull_request.head.repo.full_name != github.repository
          && github.event.pull_request.maintainer_can_modify != true
        run: |
          python -m pip install "black>=24.0,<25.0"
          python -m black --check --diff src tests samples

      - name: Lint with Pylint
        run: tox -e pylint

      - name: Typecheck with Mypy
        run: tox -e mypy

  docs:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Build docs
        run: tox -e docs

  tests:
    name: Pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            tox-env: pytest-py310
          - python-version: "3.11"
            tox-env: pytest-py311
          - python-version: "3.12"
            tox-env: pytest-py312
          - python-version: "3.13"
            tox-env: pytest-py313
          - python-version: "3.14"
            tox-env: pytest-py314

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Run tests
        run: tox -e ${{ matrix.tox-env }}

  build:
    name: Build wheel
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect minimum Python version
        id: python-version
        run: |
          version=$(python3 -c "
          import tomllib, re
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          req = data['project']['requires-python']
          print(re.search(r'[\d.]+', req).group())
          ")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.python-version.outputs.version }}

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Run integration tests
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
        run: |
          python -m pip install -r dev_requirements.txt
          python -m pip install -e .[langchain,agent-framework]
          python -m pytest -v tests/a365/integration
