name: PR validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Black, Pylint, and Mypy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Check formatting with Black
        run: tox -e black
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install -e "src/_langchain/opentelemetry-instrumentation-langchain[instruments,test]"

      - name: Check formatting with Black
        run: black --check src tests samples

      - name: Lint with Pylint (root)
        run: pylint src tests

      - name: Lint with Pylint (langchain)
        working-directory: src/_langchain/opentelemetry-instrumentation-langchain
        run: tox -e pylint

      - name: Typecheck with Mypy
        run: tox -e mypy

  tests:
    name: Pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            tox-env: pytest-py310
          - python-version: "3.11"
            tox-env: pytest-py311
          - python-version: "3.12"
            tox-env: pytest-py312
          - python-version: "3.13"
            tox-env: pytest-py313
          - python-version: "3.14"
            tox-env: pytest-py314

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Run tests
        run: tox -e ${{ matrix.tox-env }}
