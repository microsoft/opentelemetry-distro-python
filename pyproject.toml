[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "microsoft-opentelemetry"
version = "0.1.0"
description = "Minimal template for the Microsoft OpenTelemetry distro for Python"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "opentelemetry-sdk>=1.0",
    "opentelemetry-api>=1.0",
    "opentelemetry-instrumentation>=0.40b0",
    "azure-monitor-opentelemetry-exporter>=1.0.0b21",
    "azure-core>=1.28.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
]
dev = [
    "black>=24.0",
    "pylint>=3.3",
    "mypy>=1.10",
    "pyright>=1.1",
    "pytest>=8.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.black]
line-length = 120
target-version = ["py310"]

[tool.pylint.main]
py-version = "3.10"
ignore-paths = ["tests/azureMonitor"]

[tool.pylint.format]
max-line-length = 120

[tool.pylint.messages_control]
disable = [
    "missing-function-docstring",
    "missing-module-docstring",
    "missing-class-docstring",
    "import-outside-toplevel",
    "import-error",
    "no-name-in-module",
    "duplicate-code",
    "too-few-public-methods",
    "too-many-arguments",
    "too-many-positional-arguments",
    "too-many-locals",
    "wrong-import-order",
    "ungrouped-imports",
    "unknown-option-value",
    "fixme",
    "invalid-name",
]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
namespace_packages = true
explicit_package_bases = true
mypy_path = "src"

[[tool.mypy.overrides]]
module = "microsoft.azureMonitor.*"
disallow_untyped_defs = false
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "django.*",
    "azure.core.*",
    "opentelemetry.instrumentation.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.pyright]
pythonVersion = "3.10"
typeCheckingMode = "basic"
ignore = ["src/microsoft/azureMonitor", "tests/azureMonitor"]
